services:
  db:
    image: postgres:16
    container_name: playtestiq-db
    restart: always
    environment:
      POSTGRES_USER: playtestiq
      POSTGRES_PASSWORD: playtestiq
      POSTGRES_DB: playtestiq
    ports:
      - "5432:5432"
    volumes:
      - playtestiq-data:/var/lib/postgresql/data

volumes:
  playtestiq-data: